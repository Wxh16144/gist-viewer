<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}}</title>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
        "lucide-react": "https://esm.sh/lucide-react@0.575.0?external=react"
      }
    }
  </script>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --font-sans: "Inter", system-ui, sans-serif;
      --color-primary: #165DFF;
      --color-secondary: #6B7280;
      --color-dark: #1F2937;
      --color-light: #F9FAFB;
    }
  </style>

  <style type="text/tailwindcss">
    @layer utilities {
      .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); }
      .gist-card-hover { transition: transform 0.2s, box-shadow 0.2s; }
      .gist-card-hover:hover { 
        transform: translateY(-2px); 
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12); 
      }
    }
  </style>

  <script>
    window.GIST_CONFIG = {
      data: {{GIST_DATA}},
      lastUpdate: '{{LAST_UPDATE}}'
    };
  </script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Search, Github, FileCode, Clock, ExternalLink } from 'lucide-react';

    const SearchBar = ({ searchText, setSearchText }) => (
      <div className="w-full md:w-1/3">
        <div className="relative">
          <input
            type="text"
            value={searchText}
            onChange={(e) => setSearchText(e.target.value)}
            placeholder="搜索 Gist 名称/描述/语言..."
            className="w-full px-4 py-2 pl-10 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
          />
          <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-secondary w-4 h-4" />
          <i className="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-secondary"></i>
        </div>
      </div>
    );

    const FilterBar = ({ activeLang, setActiveLang, languages }) => (
      <div className="container mx-auto px-4 py-2 flex flex-wrap gap-2 mb-2">
        <button
          onClick={() => setActiveLang('all')}
          className={`px-3 py-1 rounded-full text-sm transition ${activeLang === 'all' ? 'bg-primary text-white' : 'bg-gray-200 text-dark hover:bg-gray-300'}`}
        >
          全部
        </button>
        {languages.map(lang => (
          <button
            key={lang}
            onClick={() => setActiveLang(lang)}
            className={`px-3 py-1 rounded-full text-sm transition ${activeLang === lang ? 'bg-primary text-white' : 'bg-gray-200 text-dark hover:bg-gray-300'}`}
          >
            {lang}
          </button>
        ))}
      </div>
    );

    const Header = ({ title, searchText, setSearchText, activeLang, setActiveLang, languages }) => (
      <header className="bg-white card-shadow sticky top-0 z-10">
        <div className="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
          <div 
            className="flex items-center mb-4 md:mb-0 cursor-pointer hover:opacity-80 transition-opacity"
            onClick={() => {
              setSearchText('');
              setActiveLang('all');
            }}
          >
            <Github className="w-8 h-8 text-primary mr-3" />
            <h1 className="text-2xl font-bold text-dark">{title}</h1>
          </div>
          <SearchBar searchText={searchText} setSearchText={setSearchText} />
        </div>
        <FilterBar activeLang={activeLang} setActiveLang={setActiveLang} languages={languages} />
      </header>
    );

    const EmptyState = () => (
      <div className="container mx-auto px-4 py-20 text-center flex flex-col items-center">
        <FileCode className="w-16 h-16 text-gray-300 mb-4" />
        <h3 className="text-xl text-dark font-medium mb-2">未找到匹配的 Gist</h3>
        <p className="text-secondary">请尝试调整搜索关键词或筛选条件。</p>
      </div>
    );

    const GistCard = ({ gist }) => {
      const files = Object.values(gist.files);
      const firstFile = files[0];
      const gistLang = firstFile.language || '未知';
      const gistDesc = gist.description || '无描述';
      
      const createdAt = new Date(gist.created_at);
      const updatedAt = new Date(gist.updated_at);
      const now = new Date();
      const diffTime = Math.abs(now - updatedAt);
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      // 活跃度阶梯样式
      const getActiveStyle = () => {
        if (diffDays <= 7) return "bg-green-100 text-green-700 border-green-200";
        if (diffDays <= 30) return "bg-blue-50 text-blue-600 border-blue-100";
        return "bg-gray-50 text-gray-500 border-gray-100";
      };

      const getActiveLabel = () => {
        if (diffDays <= 7) return "最近活跃";
        if (diffDays <= 30) return "近期更新";
        return "";
      };
      
      const activeStyle = getActiveStyle();
      const activeLabel = getActiveLabel();

      return (
        <div className={`bg-white rounded-xl card-shadow gist-card-hover overflow-hidden flex flex-col border-t-4 ${diffDays <= 7 ? 'border-t-green-500' : (diffDays <= 30 ? 'border-t-blue-400' : 'border-t-gray-200')}`}>
          <div className="p-6 flex-grow">
            <div className="flex justify-between items-start mb-3">
              <h3 className="text-lg font-semibold text-dark truncate w-3/4" title={gistDesc}>
                {gistDesc}
              </h3>
              <span className="px-2 py-1 bg-primary/10 text-primary text-xs rounded-full whitespace-nowrap">
                {gistLang}
              </span>
            </div>
            
            <div className="mb-4 space-y-1">
              {files.map((file, index) => (
                <div key={index} className="truncate">
                  <a 
                    href={file.raw_url}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="group inline-flex items-center text-sm text-secondary hover:text-primary transition-colors max-w-full"
                    title={`查看 ${file.filename}`}
                  >
                    <FileCode className="w-3 h-3 mr-2 flex-shrink-0 group-hover:text-primary" />
                    <span className="truncate">{file.filename}</span>
                    <ExternalLink className="w-3 h-3 ml-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0" />
                  </a>
                </div>
              ))}
            </div>
          </div>
          
          <div className="bg-gray-50 px-4 py-3 border-t border-gray-100 mt-auto">
            <div className="flex items-center justify-between gap-4">
               <div className="flex flex-col gap-0.5 text-[10px] text-gray-400">
                  <span className="flex items-center opacity-80" title={`创建于 ${createdAt.toLocaleString('zh-CN')}`}>
                    创建: {createdAt.toLocaleDateString('zh-CN')}
                  </span>
                  <span className={`flex items-center ${diffDays <= 30 ? 'text-gray-600 font-medium' : ''}`} title={`更新于 ${updatedAt.toLocaleString('zh-CN')}`}>
                    更新: {updatedAt.toLocaleDateString('zh-CN')}
                    {activeLabel && <span className={`ml-1.5 px-1 py-0 text-[9px] rounded border ${activeStyle}`}>{activeLabel}</span>}
                  </span>
               </div>
               
               <a 
                 href={gist.html_url} 
                 target="_blank" 
                 rel="noopener noreferrer"
                 className="flex-shrink-0 flex items-center justify-center px-3 py-1.5 rounded-md bg-white border border-gray-200 text-xs text-gray-600 font-medium hover:text-primary hover:border-primary hover:shadow-sm transition-all"
                 title="在 GitHub 上查看"
               >
                 <Github className="w-3.5 h-3.5 mr-1.5" />
                 查看源码
               </a>
            </div>
          </div>
        </div>
      );
    };

    const GistList = ({ gists }) => (
      <div className="columns-1 md:columns-2 lg:columns-3 gap-6 px-2 pb-8">
        {gists.map(gist => (
          <div key={gist.id} className="break-inside-avoid mb-6">
            <GistCard gist={gist} />
          </div>
        ))}
      </div>
    );

    const Footer = ({ lastUpdate }) => (
      <footer className="bg-dark text-white py-4 fixed bottom-0 left-0 right-0 z-10 shadow-lg">
        <div className="container mx-auto px-4 text-center text-sm">
          <p>纯静态 Gist 集合页 | 数据拉取时间：{lastUpdate}</p>
        </div>
      </footer>
    );

    const App = () => {
      const gistData = useMemo(() => {
        const rawData = window.GIST_CONFIG.data || [];
        // 默认按更新时间降序排序
        return rawData.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
      }, []);
      
      const lastUpdate = window.GIST_CONFIG.lastUpdate;
      
      const [activeLang, setActiveLang] = useState('all');
      const [searchText, setSearchText] = useState('');
      const [languages, setLanguages] = useState([]);

      useEffect(() => {
        const langSet = new Set();
        gistData.forEach(gist => {
          Object.values(gist.files).forEach(file => {
            if (file.language) langSet.add(file.language);
          });
        });
        setLanguages(Array.from(langSet).sort());

        const params = new URLSearchParams(window.location.search);
        setActiveLang(params.get('lang') || 'all');
        setSearchText(params.get('search') || '');
      }, []);

      useEffect(() => {
        const params = new URLSearchParams();
        if (activeLang !== 'all') params.set('lang', activeLang);
        if (searchText) params.set('search', searchText);
        window.history.replaceState({}, '', `${window.location.pathname}${params.toString() ? '?' + params.toString() : ''}`);
      }, [activeLang, searchText]);

      const filteredGists = gistData.filter(gist => {
        if (activeLang !== 'all') {
          const hasLang = Object.values(gist.files).some(file => file.language === activeLang);
          if (!hasLang) return false;
        }
        if (searchText) {
          const searchLower = searchText.toLowerCase();
          const searchContent = `${gist.description || ''} ${Object.values(gist.files).map(f => f.language || '').join(' ')} ${Object.keys(gist.files).join(' ')}`.toLowerCase();
          if (!searchContent.includes(searchLower)) return false;
        }
        return true;
      });

      return (
        <div className="flex flex-col min-h-screen">
          <Header
            title="{{PAGE_TITLE}}"
            searchText={searchText}
            setSearchText={setSearchText}
            activeLang={activeLang}
            setActiveLang={setActiveLang}
            languages={languages}
          />

          <main className="container mx-auto px-4 py-8 flex-grow pb-24">
            {filteredGists.length === 0 ? (
              <EmptyState />
            ) : (
              <GistList gists={filteredGists} />
            )}
          </main>

          <Footer lastUpdate={lastUpdate} />
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
