<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 Gist 集合页</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 图标（用于装饰和功能按钮） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- 代码高亮（可选，优化代码展示） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Tailwind 自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#6B7280',
                        dark: '#1F2937',
                        light: '#F9FAFB',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .card-shadow {
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            }
            .gist-card-hover {
                transition: transform 0.2s, box-shadow 0.2s;
            }
            .gist-card-hover:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="bg-white card-shadow sticky top-0 z-10">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center mb-4 md:mb-0">
                <i class="fa-brands fa-github text-3xl text-primary mr-3"></i>
                <h1 class="text-2xl font-bold text-dark">我的 Gist 集合</h1>
            </div>
            <div class="w-full md:w-1/3">
                <div class="relative">
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="搜索 Gist 名称/描述/语言..."
                        class="w-full px-4 py-2 pl-10 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
                    >
                    <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-secondary"></i>
                </div>
            </div>
        </div>
        <!-- 筛选栏 -->
        <div class="container mx-auto px-4 py-2 flex flex-wrap gap-2 mb-2">
            <button id="filterAll" class="px-3 py-1 rounded-full bg-primary text-white text-sm">全部</button>
            <div id="languageFilters" class="flex flex-wrap gap-2"></div>
        </div>
    </header>

    <!-- 加载状态 -->
    <div id="loading" class="container mx-auto px-4 py-10 text-center">
        <i class="fa-solid fa-spinner fa-spin text-4xl text-primary mb-4"></i>
        <p class="text-secondary text-lg">正在加载你的 Gist 数据...</p>
    </div>

    <!-- 空状态 -->
    <div id="emptyState" class="container mx-auto px-4 py-20 text-center hidden">
        <i class="fa-solid fa-file-code text-6xl text-gray-300 mb-4"></i>
        <h3 class="text-xl text-dark font-medium mb-2">暂无 Gist 数据</h3>
        <p class="text-secondary">你还没有创建任何 Gist，快去 GitHub 创建吧！</p>
    </div>

    <!-- 错误状态 -->
    <div id="errorState" class="container mx-auto px-4 py-20 text-center hidden">
        <i class="fa-solid fa-triangle-exclamation text-6xl text-amber-500 mb-4"></i>
        <h3 class="text-xl text-dark font-medium mb-2">加载失败</h3>
        <p class="text-secondary mb-4" id="errorMsg">无法获取 Gist 数据，请检查配置或网络</p>
        <button id="retryBtn" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition">重试</button>
    </div>

    <!-- Gist 卡片列表 -->
    <main class="container mx-auto px-4 py-8">
        <div id="gistList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Gist 卡片会动态生成在这里 -->
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-dark text-white py-6 mt-10">
        <div class="container mx-auto px-4 text-center">
            <p>基于 GitHub Gist API 构建 | 最后更新：<span id="lastUpdate"></span></p>
        </div>
    </footer>

    <script>
        // 配置项 - 替换为你的 GitHub 用户名
        const CONFIG = {
            GITHUB_USERNAME: '你的GitHub用户名', // 必须替换！
            // 可选：如果要访问私有 Gist，填写 Personal Access Token（仅需 gist 权限）
            GITHUB_TOKEN: '', 
            // API 地址
            GIST_API_URL: `https://api.github.com/users/${CONFIG.GITHUB_USERNAME}/gists`
        };

        // 全局变量
        let allGists = [];
        let allLanguages = new Set();

        // DOM 元素
        const loadingEl = document.getElementById('loading');
        const emptyStateEl = document.getElementById('emptyState');
        const errorStateEl = document.getElementById('errorState');
        const errorMsgEl = document.getElementById('errorMsg');
        const retryBtnEl = document.getElementById('retryBtn');
        const gistListEl = document.getElementById('gistList');
        const searchInputEl = document.getElementById('searchInput');
        const filterAllEl = document.getElementById('filterAll');
        const languageFiltersEl = document.getElementById('languageFilters');
        const lastUpdateEl = document.getElementById('lastUpdate');

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            fetchGists();
            bindEvents();
            // 更新最后更新时间
            lastUpdateEl.textContent = new Date().toLocaleString('zh-CN');
        });

        // 获取 Gist 数据
        async function fetchGists() {
            try {
                loadingEl.classList.remove('hidden');
                emptyStateEl.classList.add('hidden');
                errorStateEl.classList.add('hidden');

                // 构建请求头
                const headers = {};
                if (CONFIG.GITHUB_TOKEN) {
                    headers['Authorization'] = `token ${CONFIG.GITHUB_TOKEN}`;
                }

                // 调用 API
                const response = await fetch(CONFIG.GIST_API_URL, { headers });
                if (!response.ok) {
                    throw new Error(`API 请求失败：${response.status} ${response.statusText}`);
                }

                const gists = await response.json();
                allGists = gists;

                // 处理数据
                if (gists.length === 0) {
                    loadingEl.classList.add('hidden');
                    emptyStateEl.classList.remove('hidden');
                    return;
                }

                // 提取所有语言类型
                extractLanguages(gists);
                // 生成语言筛选按钮
                renderLanguageFilters();
                // 渲染 Gist 列表
                renderGistList(gists);

                loadingEl.classList.add('hidden');
                gistListEl.classList.remove('hidden');

            } catch (error) {
                console.error('获取 Gist 失败：', error);
                loadingEl.classList.add('hidden');
                errorStateEl.classList.remove('hidden');
                errorMsgEl.textContent = error.message;
            }
        }

        // 提取所有语言类型
        function extractLanguages(gists) {
            allLanguages.clear();
            gists.forEach(gist => {
                Object.values(gist.files).forEach(file => {
                    if (file.language) {
                        allLanguages.add(file.language);
                    }
                });
            });
        }

        // 渲染语言筛选按钮
        function renderLanguageFilters() {
            languageFiltersEl.innerHTML = '';
            Array.from(allLanguages).sort().forEach(lang => {
                const btn = document.createElement('button');
                btn.className = 'px-3 py-1 rounded-full bg-gray-200 text-dark text-sm hover:bg-gray-300 transition';
                btn.textContent = lang;
                btn.dataset.lang = lang;
                languageFiltersEl.appendChild(btn);
            });
        }

        // 渲染 Gist 列表
        function renderGistList(gists) {
            gistListEl.innerHTML = '';

            gists.forEach(gist => {
                // 获取第一个文件的信息（代表 Gist 主要内容）
                const firstFile = Object.values(gist.files)[0];
                const gistLanguage = firstFile.language || '未知';
                const gistDescription = gist.description || '无描述';
                const updatedAt = new Date(gist.updated_at).toLocaleString('zh-CN');

                // 创建卡片元素
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl card-shadow gist-card-hover overflow-hidden';
                card.dataset.lang = gistLanguage;
                card.dataset.search = `${gist.description} ${gistLanguage} ${Object.keys(gist.files).join(' ')}`.toLowerCase();

                // 卡片内容
                card.innerHTML = `
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-lg font-semibold text-dark truncate w-3/4" title="${gistDescription}">${gistDescription}</h3>
                            <span class="px-2 py-1 bg-primary/10 text-primary text-xs rounded-full">${gistLanguage}</span>
                        </div>
                        <p class="text-sm text-secondary mb-4 truncate" title="${firstFile.filename}">文件：${firstFile.filename}</p>
                        <div class="text-xs text-gray-400 flex justify-between items-center">
                            <span><i class="fa-solid fa-clock mr-1"></i> 更新于：${updatedAt}</span>
                            <a href="${gist.html_url}" target="_blank" class="text-primary hover:underline flex items-center">
                                查看 <i class="fa-solid fa-external-link-alt ml-1 text-xs"></i>
                            </a>
                        </div>
                    </div>
                    <div class="bg-gray-50 px-6 py-3 border-t border-gray-100">
                        <div class="text-xs text-secondary">
                            <span><i class="fa-solid fa-file-code mr-1"></i> 共 ${Object.keys(gist.files).length} 个文件</span>
                        </div>
                    </div>
                `;

                gistListEl.appendChild(card);
            });

            // 初始化代码高亮（如果有代码预览需求，可扩展）
            hljs.highlightAll();
        }

        // 绑定事件
        function bindEvents() {
            // 重试按钮
            retryBtnEl.addEventListener('click', fetchGists);

            // 搜索功能
            searchInputEl.addEventListener('input', filterGists);

            // 筛选全部
            filterAllEl.addEventListener('click', () => {
                // 重置筛选按钮样式
                resetFilterButtons();
                filterAllEl.classList.remove('bg-gray-200', 'text-dark');
                filterAllEl.classList.add('bg-primary', 'text-white');
                // 显示所有 Gist
                document.querySelectorAll('#gistList > div').forEach(card => {
                    card.classList.remove('hidden');
                });
            });

            // 语言筛选按钮
            languageFiltersEl.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') {
                    const lang = e.target.dataset.lang;
                    // 重置筛选按钮样式
                    resetFilterButtons();
                    // 设置当前按钮样式
                    e.target.classList.remove('bg-gray-200', 'text-dark');
                    e.target.classList.add('bg-primary', 'text-white');
                    // 筛选 Gist
                    document.querySelectorAll('#gistList > div').forEach(card => {
                        if (card.dataset.lang === lang) {
                            card.classList.remove('hidden');
                        } else {
                            card.classList.add('hidden');
                        }
                    });
                }
            });
        }

        // 重置筛选按钮样式
        function resetFilterButtons() {
            filterAllEl.classList.remove('bg-primary', 'text-white');
            filterAllEl.classList.add('bg-gray-200', 'text-dark');
            document.querySelectorAll('#languageFilters > button').forEach(btn => {
                btn.classList.remove('bg-primary', 'text-white');
                btn.classList.add('bg-gray-200', 'text-dark');
            });
        }

        // 筛选 Gist（搜索 + 筛选）
        function filterGists() {
            const searchText = searchInputEl.value.toLowerCase().trim();
            
            document.querySelectorAll('#gistList > div').forEach(card => {
                const cardSearchText = card.dataset.search;
                // 如果有搜索文本，匹配则显示，否则隐藏
                if (searchText === '') {
                    card.classList.remove('hidden');
                } else if (cardSearchText.includes(searchText)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
